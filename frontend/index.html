<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SC Trading — Аукцион STALZONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg-primary:    #080808;
        --bg-secondary:  #11151A;
        --bg-card:       #1A1F26;
        --bg-elevated:   #202633;
        --gold:          #D9AF37;
        --gold-accent:   #F2C94C;
        --gold-highlight:#FFB800;
        --gold-soft:     #B78A2A;
        --success:       #3ED598;
        --warning:       #F5B74F;
        --danger:        #FF5A5A;
        --info:          #53B7FF;
        --text-primary:  #F5F5F5;
        --text-secondary:#B8B8B8;
        --text-muted:    #7C7C7C;
        --border:        rgba(255,255,255,0.08);
      }

      html, body, #root {
        margin: 0; padding: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(217,175,55,0.25); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(242,201,76,0.4); }

      #root { position: relative; z-index: 1; }

      /* Anomaly pulse for status dot */
      @keyframes anomaly-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
