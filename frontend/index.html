<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SC Trading — Аукцион STALZONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      /* Design tokens live in src/theme.ts (tokens/QUALITY_COLORS/fs).
         Keep only the pre-React base paint here so the page has no flash
         before the MUI theme mounts. */
      *, *::before, *::after { box-sizing: border-box; }

      html, body, #root {
        margin: 0; padding: 0;
        background: #080808;
        color: #F2F4F6;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(217,175,55,0.25); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(242,201,76,0.4); }

      #root { position: relative; z-index: 1; }

      /* Anomaly pulse for status dot */
      @keyframes anomaly-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
