server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service Worker и manifest — БЕЗ иммутабельного кэша, иначе обновление SW
    # «застрянет» в кэше браузера (правило *.js ниже закэшировало бы sw.js на год).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # React Router — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статических ассетов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
