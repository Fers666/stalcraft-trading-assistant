<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Trading — Радар рынка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/base.css">
<style>
/* ============================================================
   Страничные стили «Радара рынка». Только то, чего нет в base.css.
   Цвета — только var(--…): хекс здесь = дефект.
   ============================================================ */

/* чипы-счётчики в шапке */
.chip.gold{color:var(--gold-2);border-color:var(--gold-line);background:var(--gold-dim)}

/* рейтинг-список: карточки-строки с 1px-щелями */
.rlist{display:flex;flex-direction:column;gap:1px;background:var(--line);border-top:1px solid var(--line)}
.rhead{display:flex;align-items:center;gap:14px;padding:6px 16px;background:var(--s2)}
.rhead .hk{font-family:var(--head);font-weight:600;font-size:var(--fs-105);letter-spacing:.07em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
.rrow{display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--s1);text-decoration:none}
a.rrow{cursor:pointer;transition:background-color var(--fast) var(--ease)}
a.rrow:hover{background:var(--s2)}
a.rrow:active{background:var(--s3)}

/* общий шаблон колонок (шапка и строки) */
.col-rk{width:34px;flex:none;text-align:right}
.col-item{flex:1;min-width:0;display:flex;align-items:center;gap:11px}
.col-w{width:96px;flex:none;text-align:right}
.col-p{width:150px;flex:none;text-align:right}
.col-v{width:130px;flex:none;text-align:right}
.col-g{width:96px;flex:none;text-align:right}
.col-s{width:64px;flex:none;display:flex;justify-content:flex-end}

/* ранг: 01–03 золотые, остальные muted */
.rk{font-family:var(--mono);font-weight:700;font-size:var(--fs-14);color:var(--faint);font-variant-numeric:tabular-nums}
.rk.top{color:var(--gold-2)}
.rk.one{color:var(--gold-hi);text-shadow:0 0 14px var(--gold-glow)}

/* ячейка предмета */
.ri{width:36px;height:36px;flex:none;position:relative;background:var(--s2);border:1px solid var(--line);display:grid;place-items:center}
.ri img{width:30px;height:30px;object-fit:contain}
.ri .fb{font-size:15px;position:absolute;inset:0}
.rtx{min-width:0;line-height:1.3}
.rn{display:flex;align-items:center;gap:6px;min-width:0}
.rn .nm{font-size:var(--fs-125);font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rn .pl{flex:none;font-family:var(--mono);font-size:var(--fs-105);font-weight:700;color:var(--gold-2);background:var(--gold-dim);padding:0 4px;border-radius:var(--r)}
.rs{display:flex;align-items:center;gap:6px;margin-top:2px}
.rs .rid{font-family:var(--mono);font-size:var(--fs-105);color:var(--faint)}

/* значения метрик */
.rv{font-family:var(--mono);font-size:var(--fs-14);font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.rv.g{color:var(--green)}
.rv.dim{color:var(--faint);font-weight:400}
.rvs{display:block;font-family:var(--mono);font-size:var(--fs-105);color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;margin-top:1px}
.wplus{font-family:var(--mono);font-size:var(--fs-11);font-weight:700;color:var(--green)}

/* бейдж всплеска оптовых сделок */
.spike{
  font-family:var(--mono);font-size:var(--fs-10);font-weight:700;letter-spacing:.08em;
  color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-line);
  padding:2px 7px;border-radius:var(--r);
}
/* тултипы у правого края — не за viewport */
.col-s [data-tip]:hover::after,.col-s [data-tip]:focus-visible::after{left:auto;right:0;transform:none}

/* строка-итог списка */
.tfoot-line .mr{margin-right:auto}

/* locked-стейт аддона: .pagelock/.demo.hl — в base.css */
</style>
</head>
<body>

<!-- оболочка: навбар + лента сигналов (футер добавит shell.js) -->
<div id="shell"></div>

<main class="pagecol">
  <!-- рейтинг -->
  <section class="panel" id="radar-app" aria-label="Радар рынка">
    <div class="pg-h">
      <div class="tt">
        <span class="kick">РАДАР РЫНКА // MARKET RADAR</span>
        <h1>Топ отслеживаемых предметов</h1>
        <div class="sub">За чем следят трейдеры площадки: рейтинг предметов по подпискам в Избранном, всплески оптовых сделок и выгодные лоты прямо сейчас.</div>
      </div>
      <div class="pr" id="hchips"></div>
    </div>
    <div class="rlist" id="rlist" aria-label="Рейтинг отслеживаемых предметов"></div>
    <div class="tfoot-line" id="rfoot"></div>
  </section>

  <!-- locked-стейт: аддон не активирован -->
  <section class="panel pagelock" id="lockbox" aria-label="Радар рынка — аддон не активирован" hidden></section>
</main>

<script src="../assets/data.js"></script>
<script src="../assets/app.js"></script>
<script src="../assets/shell.js"></script>
<script>
/* ============================================================
   Страница «Радар рынка»: рейтинг предметов по подпискам,
   гейтинг по аддону, пагинация. Данные — favorites + добор из
   catalogExtra (метрики добора — от категорийных медиан).
   ============================================================ */
(function(){
"use strict";
var D = window.SC_DATA, A = window.SC_APP, S = window.SC_SHELL;
var esc = A.esc, fmtN = A.fmtN, fmtCompact = A.fmtCompact;
var PAGE = 20;

/* дефолт демо: аддон «Радар рынка» включён (только если пользователь его не трогал) */
try{
  if (localStorage.getItem("sc_demo_radar") === null) localStorage.setItem("sc_demo_radar", "1");
}catch(e){}

/* --- оболочка --- */
S.render("radar");

/* ============ ДАННЫЕ РЕЙТИНГА ============ */
/* watchers — детерминированно: топ продаж получает больше подписок, сумма = 47 */
var WATCH = {dm6l2:6, "96z7y":5, m22k:4, "033k":3, qoq6:3, kqr0:2, wglp:2};
var NEWW  = {dm6l2:2, kqr0:1, m22k:1};                 /* новые подписки за 24ч */
var SPIKE = {"033k":1, "96z7y":1, m22k:1};             /* всплеск оптовых сделок */

function topCat(c){ return (c || "").split("/")[0]; }
function hash(s){ var h = 0; for (var i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0; return h; }
function median(a){
  if (!a.length) return 0;
  var s = a.slice().sort(function(x,y){ return x - y; });
  var m = s.length >> 1;
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}

/* категорийные медианы по избранному — база метрик добора */
var GROUPS = {}, ALL = {p24:[], p7:[], v7:[]};
(D.favorites || []).forEach(function(f){
  var k = topCat(f.category);
  var g = GROUPS[k] = GROUPS[k] || {p24:[], p7:[], v7:[]};
  [g, ALL].forEach(function(o){
    o.p24.push(f.stats.avgPrice24h || 0);
    o.p7.push(f.stats.avgPrice7d || 0);
    o.v7.push(f.stats.salesVolume7d || 0);
  });
});
function catMed(cat){
  var g = GROUPS[topCat(cat)] || ALL;
  return {p24: median(g.p24), p7: median(g.p7), v7: median(g.v7)};
}
/* детерминированный разброс вокруг медианы, чтобы добор не был монотонным */
function jit(id, salt, lo, hi){
  return lo + (hi - lo) * (hash(id + salt) % 1000) / 1000;
}

var ROWS = (D.favorites || []).map(function(f){
  return {
    id: f.itemId, nameRu: f.nameRu, color: f.color, icon: f.icon,
    enchant: f.enchantFilter, fav: true,
    watchers: WATCH[f.itemId] || 1,
    neww: NEWW[f.itemId] || 0,
    spike: !!SPIKE[f.itemId],
    p24: f.stats.avgPrice24h || 0,
    p7:  f.stats.avgPrice7d || 0,
    v7:  f.stats.salesVolume7d || 0,
    good: A.goodCount(f)
  };
}).concat((D.catalogExtra || []).slice(0, 17).map(function(it){
  var m = catMed(it.category);
  return {
    id: it.itemId, nameRu: it.nameRu, color: it.color, icon: it.icon,
    enchant: null, fav: false,
    watchers: 1, neww: 0, spike: false,
    p24: Math.round(m.p24 * jit(it.itemId, "p", 0.55, 1.35)),
    p7:  Math.round(m.p7  * jit(it.itemId, "p", 0.55, 1.35)),
    v7:  Math.round(m.v7  * jit(it.itemId, "v", 0.5, 1.4)),
    good: null
  };
}));
ROWS.sort(function(a, b){
  return b.watchers - a.watchers || b.v7 - a.v7 || a.nameRu.localeCompare(b.nameRu, "ru");
});
var TOTAL = ROWS.length;                                             /* 29 */
var SUBS = ROWS.reduce(function(s, r){ return s + r.watchers; }, 0); /* 47 */
var pg = 1;

/* ============ ШАПКА ============ */
document.getElementById("hchips").innerHTML =
  '<span class="chip mono">' + fmtN(SUBS) + ' активных подписок</span>' +
  '<span class="chip mono gold">' + fmtN(TOTAL) + ' уникальных предметов</span>';

/* ============ СПИСОК ============ */
function rowHtml(r, idx){
  var rank = String(idx + 1).padStart(2, "0");
  var rk = A.rankOf(r);
  var inner =
    '<span class="col-rk rk' + (idx === 0 ? " one" : (idx < 3 ? " top" : "")) + '">' + rank + '</span>' +
    '<span class="col-item">' +
      A.iconHtml(r, "ri") +
      '<span class="rtx">' +
        '<span class="rn"><span class="nm">' + esc(r.nameRu) + '</span>' +
        (r.enchant ? '<span class="pl">+' + r.enchant + '</span>' : '') + '</span>' +
        '<span class="rs">' +
          '<span class="chip q" style="--qc:var(' + rk.v + ')"><span class="qd" aria-hidden="true"></span>' + rk.name + '</span>' +
          '<span class="rid">' + esc(r.id) + '</span>' +
        '</span>' +
      '</span>' +
    '</span>' +
    '<span class="col-w"><span class="rv">' + fmtN(r.watchers) + '</span>' +
      (r.neww > 0 ? ' <span class="wplus" data-tip="Новых за 24ч">+' + r.neww + '</span>' : '') +
    '</span>' +
    '<span class="col-p"><span class="rv">' + fmtCompact(r.p24) + '</span>' +
      '<span class="rvs">7д ' + fmtCompact(r.p7) + '</span></span>' +
    '<span class="col-v"><span class="rv">' + fmtN(r.v7) + '</span>' +
      '<span class="rvs">шт за 7д</span></span>' +
    '<span class="col-g">' +
      (r.good == null
        ? '<span class="rv dim">—</span>'
        : '<span class="rv' + (r.good > 0 ? " g" : "") + '">' + fmtN(r.good) + '</span>') +
    '</span>' +
    '<span class="col-s">' +
      (r.spike ? '<span class="spike" data-tip="Всплеск оптовых сделок за 24ч">SPIKE</span>' : '') +
    '</span>';
  /* клик по строке ведёт в Избранное — только если предмет там есть */
  if (r.fav){
    return '<a class="rrow" href="favorites.html?item=' + encodeURIComponent(r.id) + '" ' +
      'aria-label="' + esc(r.nameRu) + ' — открыть в Избранном">' + inner + '</a>';
  }
  return '<div class="rrow">' + inner + '</div>';
}
function renderList(){
  var from = (pg - 1) * PAGE, to = Math.min(pg * PAGE, TOTAL);
  var h =
    '<div class="rhead">' +
      '<span class="col-rk hk">#</span>' +
      '<span class="col-item hk">Предмет</span>' +
      '<span class="col-w hk">Следят</span>' +
      '<span class="col-p hk">Цена 24ч</span>' +
      '<span class="col-v hk">Объём продаж</span>' +
      '<span class="col-g hk">Выгодных</span>' +
      '<span class="col-s hk"></span>' +
    '</div>';
  for (var i = from; i < to; i++) h += rowHtml(ROWS[i], i);
  document.getElementById("rlist").innerHTML = h;

  var foot = document.getElementById("rfoot");
  foot.innerHTML =
    '<span class="mr">рассчитано ' + A.fmtHM(A.NOW) + ' · подписки всех пользователей терминала</span>' +
    '<span>' + (from + 1) + '–' + to + ' из ' + TOTAL + '</span>' +
    '<button type="button" class="pgbtn" data-d="-1" aria-label="Предыдущая страница"' + (pg <= 1 ? " disabled" : "") + '>‹</button>' +
    '<button type="button" class="pgbtn" data-d="1" aria-label="Следующая страница"' + (to >= TOTAL ? " disabled" : "") + '>›</button>';
  Array.prototype.forEach.call(foot.querySelectorAll(".pgbtn"), function(b){
    b.addEventListener("click", function(){
      pg += Number(b.getAttribute("data-d"));
      renderList();
      window.scrollTo({top: 0, behavior: "smooth"});
    });
  });
}

/* ============ ГЕЙТИНГ ПО АДДОНУ ============ */
function highlightDemo(){
  var d = document.querySelector(".demo");
  if (!d) return;
  d.classList.add("hl");
  var cb = document.getElementById("demo-radar");
  if (cb) cb.focus();
  setTimeout(function(){
    var d2 = document.querySelector(".demo");
    if (d2) d2.classList.remove("hl");
  }, 3200);
}
function renderLock(){
  document.getElementById("lockbox").innerHTML =
    S.lockSvg(26, 28, 1.1) +
    '<span class="kick">Радар рынка</span>' +
    '<span class="big">Доступно как отдельный аддон</span>' +
    '<span class="note">Радар показывает, за чем следят все трейдеры терминала: топ предметов по подпискам, всплески оптовых сделок и выгодные лоты. Подключается администратором отдельно от тарифа.</span>' +
    '<div class="acts">' +
      '<button type="button" class="gbtn" id="lk-how">Как подключить</button>' +
      '<button type="button" class="qbtn" id="lk-demo">Включить в демо</button>' +
    '</div>';
  document.getElementById("lk-how").addEventListener("click", function(){
    A.toast("Аддон подключает администратор — напиши в поддержку терминала");
    highlightDemo();
  });
  document.getElementById("lk-demo").addEventListener("click", function(){
    var cb = document.getElementById("demo-radar");
    if (cb) cb.click();                     /* тот же путь, что и ручной клик по чекбоксу */
  });
}
function applyLock(){
  var locked = !S.hasRadar();
  document.getElementById("radar-app").hidden = locked;
  document.getElementById("lockbox").hidden = !locked;
  if (locked) renderLock();
  else renderList();
}

/* смена тарифа/аддона в демо-переключателе — без перезагрузки */
window.addEventListener("sc:tier", applyLock);

applyLock();
})();
</script>
</body>
</html>
